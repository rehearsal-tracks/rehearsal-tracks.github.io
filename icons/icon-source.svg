<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512">
  <!-- Full-bleed opaque icon for apple-touch-icon + manifest purpose:"any".
       iOS applies its own rounded mask, so the background bleeds edge-to-edge. -->
  <defs>
    <linearGradient id="g" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#8bff1f"/>
      <stop offset="1" stop-color="#ff6a1a"/>
    </linearGradient>
  </defs>
  <rect width="512" height="512" fill="#0a0e07"/>
  <g fill="url(#g)">
    <rect x="82"  y="181" width="44" height="150" rx="22"/>
    <rect x="158" y="131" width="44" height="250" rx="22"/>
    <rect x="234" y="86"  width="44" height="340" rx="22"/>
    <rect x="310" y="131" width="44" height="250" rx="22"/>
    <rect x="386" y="181" width="44" height="150" rx="22"/>
  </g>
</svg>
