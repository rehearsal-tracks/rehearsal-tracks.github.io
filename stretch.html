<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Rehearsal Tracks — Slow-down (experimental)</title>
  <meta name="theme-color" content="#0a0e07" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
  <script type="module" src="js/lava-lamp.js"></script>
  <script type="module">
    import "https://esm.sh/@stemplayer-js/stemplayer-js/element.js";
  </script>
</head>
<body>
  <div id="nav-root"></div>

  <main class="player" aria-live="polite">
    <header class="player__header">
      <div class="player__titles">
        <p class="player__eyebrow">Slow-down · experimental</p>
        <h1 class="player__title" id="title">Loading…</h1>
        <p class="player__artist" id="artist"></p>
      </div>
    </header>

    <p class="error-card" id="status" hidden></p>
    <div id="player"></div>

    <p class="player__hint">Pitch-preserving time-stretch (0.7×–1×). Experimental — the audio is
      driven by a headless stretch core, not the standard player.</p>
  </main>

  <script type="module" src="js/stretch.js"></script>
</body>
</html>
