<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover" />
  <title>Rehearsal Tracks — Player</title>
  <meta name="theme-color" content="#0a0e07" />
  <link rel="icon" href="favicon.svg" type="image/svg+xml" />
  <!-- PWA: installable app shell -->
  <link rel="manifest" href="manifest.webmanifest" />
  <link rel="apple-touch-icon" href="icons/apple-touch-icon.png" />
  <meta name="apple-mobile-web-app-capable" content="yes" />
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent" />
  <meta name="apple-mobile-web-app-title" content="Rehearsal" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Anton&display=swap" />
  <link rel="stylesheet" href="css/styles.css" />
  <script type="module" src="js/lava-lamp.js"></script>
  <script type="module">
    import "https://esm.sh/@stemplayer-js/stemplayer-js/element.js";
  </script>
</head>
<body>
  <div id="nav-root"></div>

  <main class="player" aria-live="polite">
    <header class="player__header">
      <div class="player__titles">
        <p class="player__eyebrow">Now Mixing</p>
        <h1 class="player__title" id="title">Loading…</h1>
        <p class="player__artist" id="artist"></p>
      </div>
    </header>

    <p class="error-card" id="status" hidden></p>
    <div id="player"></div>

    <p class="player__hint">Created EXCLUSIVELY for (and beta tested by) the Cast of Anonymous Theatre's TOXIC AVENGER</p>
  </main>

  <script type="module" src="js/stream.js"></script>
  <script type="module" src="js/sw-register.js"></script>
</body>
</html>
